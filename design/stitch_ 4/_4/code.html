<script>
        // Micro-interaction for the security ring on load
        window.addEventListener('DOMContentLoaded', () => {
            const ring = document.querySelector('.security-ring');
            // Animate from 440 (0%) to 66 (85%)
            ring.style.strokeDashoffset = '440';
            setTimeout(() => {
                ring.style.strokeDashoffset = '66';
            }, 100);
        });

        // Simple button active states feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.classList.add('opacity-80');
            });
            btn.addEventListener('touchend', () => {
                btn.classList.remove('opacity-80');
            });
        });
    </script>
