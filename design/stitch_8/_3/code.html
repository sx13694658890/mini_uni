<script>
        // Simple Interaction logic for quantity controls
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            if (icon.textContent === 'add' || icon.textContent === 'remove') {
                icon.parentElement.addEventListener('click', () => {
                    const counter = icon.parentElement.parentElement.querySelector('span:not(.material-symbols-outlined)');
                    let val = parseInt(counter.textContent);
                    if (icon.textContent === 'add') {
                        val++;
                    } else if (icon.textContent === 'remove' && val > 1) {
                        val--;
                    }
                    counter.textContent = val;
                });
            }
        });
    </script>
