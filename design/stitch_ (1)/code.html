<script>
        // Simple micro-interaction for active category state
        const categories = document.querySelectorAll('.flex-shrink-0');
        categories.forEach(btn => {
            btn.addEventListener('click', () => {
                categories.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-white');
                    b.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                });
                btn.classList.add('bg-primary-container', 'text-white');
                btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
            });
        });

        // Add to cart animation feedback
        const cartButtons = document.querySelectorAll('button:has(.material-symbols-outlined)');
        cartButtons.forEach(btn => {
            if(btn.innerHTML.includes('add_shopping_cart')) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const icon = btn.querySelector('.material-symbols-outlined');
                    icon.textContent = 'check';
                    btn.classList.replace('bg-primary-container', 'bg-emerald-500');
                    setTimeout(() => {
                        icon.textContent = 'add_shopping_cart';
                        btn.classList.replace('bg-emerald-500', 'bg-primary-container');
                    }, 1000);
                });
            }
        });
    </script>
