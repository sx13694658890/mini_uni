<script>
        // Micro-interaction for Add to Cart
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                if (this.innerHTML.includes('add_shopping_cart') || this.innerHTML.includes('add_circle') || this.innerText === '抢购') {
                    // Create ripple/feedback effect
                    const feedback = document.createElement('div');
                    feedback.className = 'fixed pointer-events-none bg-secondary text-white text-[10px] px-2 py-1 rounded-full z-[100] transition-all duration-500';
                    feedback.innerText = '已加入购物车';
                    feedback.style.left = e.clientX + 'px';
                    feedback.style.top = e.clientY + 'px';
                    document.body.appendChild(feedback);
                    
                    setTimeout(() => {
                        feedback.style.transform = 'translateY(-40px)';
                        feedback.style.opacity = '0';
                    }, 10);
                    
                    setTimeout(() => feedback.remove(), 600);
                }
            });
        });
