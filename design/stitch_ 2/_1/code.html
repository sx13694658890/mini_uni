<!DOCTYPE html>

<html lang="zh-CN"><head>

<title>余额充值 - 海味鲜 Ocean Fresh</title>

                    "secondary-container": "#fe7e4f",

                    "tertiary-fixed": "#d3e5f1",

                    "on-tertiary": "#ffffff",

            "borderRadius": {

            "spacing": {

            "fontFamily": {

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .card-active {
            border: 2px solid #a43c12; /* Secondary Coral Orange */
            background-color: #ffdbcf; /* secondary-fixed */
        }
        .payment-option input:checked + label {
            border-color: #001e40;
            background-color: #e7eeff;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c3c6d1;
            border-radius: 10px;
        }
        .wave-bg {
            background: linear-gradient(180deg, #001e40 0%, #003366 100%);
            border-radius: 0 0 2rem 2rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Top AppBar (from JSON context) -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm flex items-center justify-between px-container-margin h-16">
<button class="active:scale-95 transition-transform hover:bg-surface-container-low p-2 rounded-full">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">充值</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow pt-16 pb-32">
<!-- Balance Card -->
<section class="px-container-margin mt-6">
<div class="wave-bg p-8 shadow-xl relative overflow-hidden text-on-primary">
<!-- Abstract Wave Decoration -->
<div class="absolute top-0 right-0 opacity-10">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">waves</span>
</div>
<p class="font-label-sm text-label-sm opacity-80 uppercase tracking-widest">当前可用余额 (元)</p>
<div class="flex items-baseline mt-2">
<span class="text-2xl font-bold mr-1">¥</span>
<span class="text-5xl font-extrabold tracking-tight">1,258.40</span>
</div>
<div class="mt-6 flex items-center bg-white/10 backdrop-blur-md rounded-xl p-3 inline-flex">
<span class="material-symbols-outlined text-sm mr-2">verified_user</span>
<span class="text-xs">资金由银行级加密保障</span>
</div>
</div>
</section>
<!-- Recharge Options -->
<section class="px-container-margin mt-section-gap">
<div class="flex items-center justify-between mb-4">
<h2 class="font-headline-md text-headline-md">选择充值方案</h2>
<span class="text-secondary text-xs font-semibold">充越多送越多</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Option 1 -->
<button class="recharge-plan group relative flex flex-col items-center justify-center p-6 bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200 active:scale-95" onclick="selectPlan(this, 100)">
<span class="text-label-sm text-on-surface-variant group-[.card-active]:text-secondary">充值</span>
<div class="text-2xl font-bold mt-1">¥100</div>
<div class="mt-2 py-1 px-3 bg-secondary-fixed text-on-secondary-fixed text-xs rounded-full font-bold">送 ¥10</div>
</button>
<!-- Option 2: Popular -->
<button class="recharge-plan card-active group relative flex flex-col items-center justify-center p-6 bg-surface-container-lowest border-2 border-secondary rounded-xl transition-all duration-200 active:scale-95" onclick="selectPlan(this, 500)">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-secondary text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-lg uppercase tracking-tight">最受欢迎</div>
<span class="text-label-sm text-secondary">充值</span>
<div class="text-2xl font-bold mt-1">¥500</div>
<div class="mt-2 py-1 px-3 bg-secondary text-white text-xs rounded-full font-bold">送 ¥60</div>
</button>
<!-- Option 3: Best Value -->
<button class="recharge-plan group relative flex flex-col items-center justify-center p-6 bg-surface-container-lowest border-2 border-outline-variant rounded-xl transition-all duration-200 active:scale-95" onclick="selectPlan(this, 1000)">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-primary text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-lg uppercase tracking-tight">超值推荐</div>
<span class="text-label-sm text-on-surface-variant group-[.card-active]:text-secondary">充值</span>
<div class="text-2xl font-bold mt-1">¥1000</div>
<div class="mt-2 py-1 px-3 bg-secondary-fixed text-on-secondary-fixed text-xs rounded-full font-bold">送 ¥150</div>
</button>
<!-- Custom Amount -->
<div class="flex flex-col items-center justify-center p-6 bg-surface-container-low border-2 border-dashed border-outline-variant rounded-xl">
<span class="text-label-sm text-on-surface-variant">自定义金额</span>
<div class="mt-2 flex items-center border-b border-outline w-full">
<span class="text-lg font-bold">¥</span>
<input class="bg-transparent border-none focus:ring-0 text-center font-bold text-lg w-full placeholder:text-outline/50 placeholder:text-sm" placeholder="输入金额" type="number"/>
</div>
</div>
</div>
</section>
<!-- Payment Methods -->
<section class="px-container-margin mt-section-gap">
<h2 class="font-headline-md text-headline-md mb-4">支付方式</h2>
<div class="space-y-3">
<div class="payment-option">
<input checked="" class="hidden" id="wechat" name="payment" type="radio"/>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer transition-all hover:border-primary" for="wechat">
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center mr-3">
<span class="material-symbols-outlined text-green-600">account_balance_wallet</span>
</div>
<span class="font-body-lg font-semibold">微信支付</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 radio-checked-icon">check_circle</span>
</label>
</div>
<div class="payment-option">
<input class="hidden" id="alipay" name="payment" type="radio"/>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer transition-all hover:border-primary" for="alipay">
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center mr-3">
<span class="material-symbols-outlined text-blue-500">payments</span>
</div>
<span class="font-body-lg font-semibold">支付宝</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 radio-checked-icon">check_circle</span>
</label>
</div>
<div class="payment-option">
<input class="hidden" id="bank" name="payment" type="radio"/>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant rounded-xl cursor-pointer transition-all hover:border-primary" for="bank">
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center mr-3">
<span class="material-symbols-outlined text-orange-700">credit_card</span>
</div>
<span class="font-body-lg font-semibold">银行卡支付</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 radio-checked-icon">check_circle</span>
</label>
</div>
</div>
</section>
<!-- Agreements -->
<section class="px-container-margin mt-6 mb-8">
<label class="flex items-start gap-2 cursor-pointer">
<input checked="" class="mt-1 rounded text-primary focus:ring-primary h-4 w-4" type="checkbox"/>
<span class="text-xs text-on-surface-variant leading-relaxed">
                    已阅读并同意 <a class="text-primary-container underline font-semibold" href="#">《海味鲜会员充值协议》</a> 及 <a class="text-primary-container underline font-semibold" href="#">《隐私权政策》</a>，充值金额仅限平台内消费使用。
                </span>
</label>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 w-full z-50 bg-surface-bright border-t border-outline-variant/30 p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<div class="max-w-md mx-auto flex flex-col gap-2">
<div class="flex justify-between items-center px-2 mb-1">
<span class="text-on-surface-variant text-sm font-medium">应付金额</span>
<span class="text-secondary font-bold text-2xl" id="total-amount">¥500.00</span>
</div>
<button class="w-full bg-primary-container text-white py-4 rounded-full font-bold text-lg shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined">bolt</span>
                立即充值
            </button>
</div>
</footer>
<script>
        function selectPlan(element, amount) {
            // Remove active class from all
            document.querySelectorAll('.recharge-plan').forEach(plan => {
                plan.classList.remove('card-active');
                plan.classList.remove('border-secondary');
                plan.classList.add('border-outline-variant');
                // Adjust inner text colors
                const label = plan.querySelector('.text-label-sm');
                if (label) {
                    label.classList.remove('text-secondary');
                    label.classList.add('text-on-surface-variant');
                }
            });

            // Add active class to clicked
            element.classList.add('card-active');
            element.classList.remove('border-outline-variant');
            element.classList.add('border-secondary');
            
            const label = element.querySelector('.text-label-sm');
            if (label) {
                label.classList.add('text-secondary');
                label.classList.remove('text-on-surface-variant');
            }

            // Update footer amount
            document.getElementById('total-amount').innerText = `¥${amount.toFixed(2)}`;
        }

        // Custom styling for radio buttons visibility sync
        document.querySelectorAll('input[name="payment"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.radio-checked-icon').forEach(icon => icon.classList.add('opacity-0'));
                if (this.checked) {
                    this.nextElementSibling.querySelector('.radio-checked-icon').classList.remove('opacity-0');
                }
            });
        });

        // Initialize state
        window.onload = () => {
            // Initial check for radio buttons
            const checkedRadio = document.querySelector('input[name="payment"]:checked');
            if (checkedRadio) {
                checkedRadio.nextElementSibling.querySelector('.radio-checked-icon').classList.remove('opacity-0');
            }
        };
    </script>
</body></html>
